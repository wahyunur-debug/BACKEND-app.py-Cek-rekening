<!DOCTYPE html>
<html>
<head>
    <title>Payroll Validator</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: #f4f6f9;
            padding: 40px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .upload-box {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 10px 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background: #0056b3;
        }

        .summary {
            font-size: 14px;
            color: #555;
            margin-top: 10px;
        }

        .result {
            margin-top: 10px;
        }

        .item {
            background: white;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .valid {
            border-left: 5px solid #28a745;
        }

        .invalid {
            border-left: 5px solid #dc3545;
        }

        .name {
            font-weight: bold;
            font-size: 15px;
        }

        .detail {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>🚀 Payroll Validator</h2>

    <div class="card">
        <div class="upload-box">
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">VALIDASI</button>
        </div>

        <div class="summary" id="summary"></div>
    </div>

    <div class="result" id="result"></div>

</div>

<script>
async function uploadFile() {
    try {
        const fileInput = document.getElementById("fileInput").files[0];

        if (!fileInput) {
            alert("Pilih file dulu!");
            return;
        }

        const formData = new FormData();
        formData.append("file", fileInput);

        const res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        let total = data.length;
        let valid = 0;
        let invalid = 0;

        let html = "";

        data.forEach(row => {
            if (row.status === "MATCH") valid++;
            else invalid++;

            html += `
                <div class="item ${row.status === "MATCH" ? 'valid' : 'invalid'}">
                    <div class="name">${row.nama}</div>
                    <div class="detail">
                        ${row.bank} • ${row.rekening}
                        <br>Status: ${row.status}
                    </div>
                </div>
            `;
        });

        document.getElementById("summary").innerHTML =
            `Total: <b>${total}</b> &nbsp; | &nbsp; 
             Valid: <b>${valid}</b> &nbsp; | &nbsp; 
             Invalid: <b>${invalid}</b>`;

        document.getElementById("result").innerHTML = html;

    } catch (err) {
        alert("Error: " + err);
        console.log(err);
    }
}
</script>

</body>
</html>
