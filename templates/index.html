<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Validasi Rekening Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e8eaf0;
      --muted: #6b7080;
      --accent: #4f8cff;
      --match: #22c55e;
      --mirip: #f59e0b;
      --salah: #ef4444;
      --invalid: #6b7080;
      --format: #a855f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 6px;
    }

    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      position: relative;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: #1e2235;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .upload-zone h2 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .upload-zone p {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .file-selected {
      margin-top: 16px;
      padding: 10px 16px;
      background: #1e2235;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      display: none;
    }

    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.3px;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .progress.active { display: block; }

    .error-box {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      background: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #ff8080;
    }

    .results {
      margin-top: 32px;
      display: none;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .results-header h2 {
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
    }

    .summary {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .badge {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
    }

    .badge.match   { background: #0d2b1a; color: var(--match); border: 1px solid #1a4a2a; }
    .badge.mirip   { background: #2b1f0d; color: var(--mirip); border: 1px solid #4a3510; }
    .badge.salah   { background: #2b0d0d; color: var(--salah); border: 1px solid #4a1515; }
    .badge.invalid { background: #1a1d27; color: var(--invalid); border: 1px solid var(--border); }
    .badge.format  { background: #1f0d2b; color: var(--format); border: 1px solid #3a1a4a; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }

    thead th {
      background: var(--surface);
      padding: 10px 14px;
      text-align: left;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:hover { background: var(--surface); }

    tbody td {
      padding: 10px 14px;
      vertical-align: middle;
    }

    .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .status-pill.MATCH        { background: #0d2b1a; color: var(--match); }
    .status-pill.MIRIP        { background: #2b1f0d; color: var(--mirip); }
    .status-pill.SALAH        { background: #2b0d0d; color: var(--salah); }
    .status-pill.INVALID      { background: #1a1d27; color: var(--invalid); }
    .status-pill.FORMAT\.SALAH { background: #1f0d2b; color: var(--format); }

    .keterangan { color: var(--muted); font-size: 0.78rem; }

    .export-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: all 0.2s;
    }

    .export-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Validasi <span>Rekening Bank</span></h1>
    <p>Upload file Excel dengan kolom: nama, rekening, bank</p>
  </header>

  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
    <div class="upload-icon">📂</div>
    <h2>Drag & drop atau klik untuk pilih file</h2>
    <p>Format: .xlsx atau .xls</p>
  </div>

  <div class="file-selected" id="fileSelected"></div>

  <button class="btn" id="uploadBtn" disabled onclick="prosesFile()">
    Proses Validasi
  </button>

  <div class="progress" id="progress">⏳ Sedang memproses... mohon tunggu</div>
  <div class="error-box" id="errorBox"></div>

  <div class="results" id="results">
    <div class="results-header">
      <h2>// HASIL VALIDASI</h2>
      <button class="export-btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="summary" id="summary"></div>
    <table>
      <thead>
        <tr>
          <th>Nama Input</th>
          <th>Rekening</th>
          <th>Bank</th>
          <th>Nama di Bank</th>
          <th>Status</th>
          <th>Keterangan</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  let resultData = [];
  const fileInput = document.getElementById('fileInput');
  const fileSelected = document.getElementById('fileSelected');
  const uploadBtn = document.getElementById('uploadBtn');
  const dropZone = document.getElementById('dropZone');

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) {
      fileSelected.style.display = 'block';
      fileSelected.textContent = '📄 ' + fileInput.files[0].name;
      uploadBtn.disabled = false;
    }
  });

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      fileInput.files = e.dataTransfer.files;
      fileSelected.style.display = 'block';
      fileSelected.textContent = '📄 ' + file.name;
      uploadBtn.disabled = false;
    }
  });

  async function prosesFile() {
    const file = fileInput.files[0];
    if (!file) return;

    const progress = document.getElementById('progress');
    const errorBox = document.getElementById('errorBox');
    const results = document.getElementById('results');

    progress.classList.add('active');
    errorBox.style.display = 'none';
    results.style.display = 'none';
    uploadBtn.disabled = true;

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();

      if (data.error) {
        errorBox.style.display = 'block';
        errorBox.textContent = '❌ ' + data.error;
        return;
      }

      resultData = data;
      tampilkanHasil(data);
    } catch (err) {
      errorBox.style.display = 'block';
      errorBox.textContent = '❌ Gagal terhubung ke server';
    } finally {
      progress.classList.remove('active');
      uploadBtn.disabled = false;
    }
  }

  function tampilkanHasil(data) {
    const tableBody = document.getElementById('tableBody');
    const summary = document.getElementById('summary');
    const results = document.getElementById('results');

    // hitung summary
    const counts = { MATCH: 0, MIRIP: 0, SALAH: 0, INVALID: 0, 'FORMAT SALAH': 0 };
    data.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });

    const labelMap = { MATCH: 'match', MIRIP: 'mirip', SALAH: 'salah', INVALID: 'invalid', 'FORMAT SALAH': 'format' };
    summary.innerHTML = Object.entries(counts).map(([k, v]) =>
      `<span class="badge ${labelMap[k]}">${k}: ${v}</span>`
    ).join('');

    tableBody.innerHTML = data.map(r => `
      <tr>
        <td>${r.nama}</td>
        <td style="font-family:'IBM Plex Mono',monospace">${r.rekening}</td>
        <td>${r.bank}</td>
        <td>${r.nama_bank || '<span style="color:var(--muted)">—</span>'}</td>
        <td><span class="status-pill ${r.status}">${r.status}</span></td>
        <td class="keterangan">${r.keterangan || ''}</td>
      </tr>
    `).join('');

    results.style.display = 'block';
  }

  function exportCSV() {
    if (!resultData.length) return;
    const headers = ['Nama', 'Rekening', 'Bank', 'Nama di Bank', 'Status', 'Keterangan'];
    const rows = resultData.map(r => [r.nama, r.rekening, r.bank, r.nama_bank, r.status, r.keterangan]);
    const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'hasil_validasi.csv'; a.click();
  }
</script>
</body>
</html>
